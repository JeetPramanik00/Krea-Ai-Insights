kind = "web"
previewPath = "/"
title = "Krea Pricing Page"
version = "1.0.0"
id = "artifacts/krea-pricing"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19778

[services.development]
run = "pnpm --filter @workspace/krea-pricing run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/krea-pricing", "run", "build" ]
run = "pnpm --filter @workspace/krea-pricing run start"

[services.env]
PORT = "19778"
